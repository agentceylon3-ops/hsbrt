<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Thoran - Positioned Layers</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            display: flex;
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .thoran-frame {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            flex-shrink: 0; 
        }

        .video-layer {
            position: absolute;
            mix-blend-mode: screen;
            pointer-events: none;
            outline: none;
        }

        .sakilla-vid {
            width: 110%;
            height: auto;
            bottom: 20%;
            z-index: 1;
        }

        .budda-vid {
            width: 30%;
            height: auto;
            top: 15%;
            z-index: 2;
        }

        .kodiya-vid {
            width: 20%;
            height: auto;
            top: 10%;
            z-index: 3;
        }

        .box-wrapper {
            display: flex;
            justify-content: center;
            padding: 30px 0;
            width: 100%;
            margin-top: -280px;
        }

        .animated-border-box {
            position: relative;
            width: 850px;
            height: 120px;
            background: #000; 
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .animated-border-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(transparent, transparent, transparent, #ffee00);
            animation: borderRotate 4s linear infinite;
        }

        .inner-content {
            position: absolute;
            inset: 4px;
            background:linear-gradient(to right, #f1ee19, #cfc20a, #ffee00);
            border-radius: 16px;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .side-photo {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid #fbc02d;
        }

        .text-area h2 {
            font-size: 2.2rem;
            color: #4e342e;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
        }

        .modal-content {
            background: #fff59d; 
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 238, 0, 0.5);
            max-width: 400px;
            border: 3px solid #fbc02d;
        }

        .modal-content h3 {
            margin-top: 0;
            color: #4e342e;
        }

        #play-btn {
            background-color: #fbc02d;
            color: #4e342e;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        #play-btn:hover {
            background-color: #ffeb3b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="thoran-frame">
        <video autoplay loop muted playsinline class="video-layer sakilla-vid">
            <source src="sekilla21.mp4" type="video/mp4">
        </video>
        <video autoplay loop muted playsinline class="video-layer budda-vid">
            <source src="budda.mp4" type="video/mp4">
        </video>
        <video autoplay loop muted playsinline class="video-layer kodiya-vid">
            <source src="kodiya.mp4" type="video/mp4">
        </video>
    </div>

    <div class="box-wrapper">
        <div class="animated-border-box">
            <div class="inner-content">
                <img src="dp.jpg" class="side-photo" alt="Side Image">
                <div class="text-area">
                    <h2>නළපාන ජාතකය</h2>
                </div>
                <img src="dp.jpg" class="side-photo" alt="Side Image">
            </div>
        </div>
    </div>

    <div id="music-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Dp වෙසක් තොරන් රාජයා ⚜️</h3>
            <p>Dp Education It Campus <br> 2026 වෙසක් තොරන් රාජයා <br> Pelmadulla Branch</p>
            <button id="play-btn">Watch Now</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="budusong.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const modal = document.getElementById('music-modal');
            const playBtn = document.getElementById('play-btn');
            const audio = document.getElementById('bg-music');
            const videos = document.querySelectorAll('video');

            playBtn.addEventListener('click', function() {
                audio.play().catch(error => console.log("Audio failed:", error));
                videos.forEach(video => {
                    video.muted = false; 
                    video.play().catch(error => console.log("Video failed:", error));
                });
                modal.style.display = 'none'; 
            });

          
            document.addEventListener("visibilitychange", function() {
                if (document.hidden) {
                    audio.pause();
                    videos.forEach(v => v.pause());
                } else {
                  
                    if (modal.style.display === 'none') {
                        audio.play();
                        videos.forEach(v => v.play());
                    }
                }
            });
        });
    </script>
</body>
</html>
